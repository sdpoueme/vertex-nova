# Vertex Nova — Proactive Actions Configuration

routing:
  night:
    hours: [22, 23, 0, 1, 2, 3, 4, 5, 6]
    channel: telegram
  morning:
    hours: [7, 8]
    channel: echo
    device: Serge's Echo Show
  workday:
    hours: [9, 10, 11, 12, 13, 14, 15, 16]
    channel: echo
    device: Bureau Serge
  evening:
    hours: [17, 18]
    channel: echo
    device: Serge's Echo Show
  prime_time:
    hours: [19, 20]
    channel: sonos
    room: Sous-sol
  late_evening:
    hours: [21]
    channel: telegram

actions:
  - name: breaking-news
    description: "Major breaking news"
    interval_minutes: 240
    model: qwen3:8b
    prompt: >
      Utilise news_search sans sujet pour les nouvelles canadiennes.
      Puis utilise news_search avec le sujet "Cameroun" pour les nouvelles du Cameroun.
      À partir des résultats, fais un briefing en français organisé en sections:
      🇨🇦 Canada & Monde — les 3-4 nouvelles les plus importantes
      🇨🇲 Cameroun — les 2-3 nouvelles principales
      💼 Business & Tech — si pertinent
      Pour chaque nouvelle: titre, 1-2 phrases de résumé, source.
      Si rien de significatif dans une section, omets-la.
      Si rien du tout, réponds "Je n'ai aucune nouvelle à partager".
    notify_condition: not_skip
    priority: high

  - name: weather-alert
    description: "Severe weather warnings"
    interval_minutes: 120
    model: qwen3:8b
    prompt: >
      Utilise web_search pour chercher "alertes météo Sainte-Julie Québec"
      et "Environnement Canada avertissements Montérégie".
      Ne rapporte QUE les avertissements sévères (tempête, verglas, froid/chaleur extrême).
      IMPORTANT: Si météo normale sans avertissement sévère, tu DOIS répondre uniquement "SKIP".
      Si alerte sévère, résume en français en 2-3 phrases claires.
    notify_condition: not_skip
    priority: high

  - name: home-maintenance-check
    description: "Seasonal home maintenance"
    interval_minutes: 1440
    model: qwen3:8b
    prompt: >
      Basé sur la date et la saison, quelles tâches d'entretien sont dues pour
      une maison à Sainte-Julie, Québec? Filtres HVAC, gouttières, déneigement,
      pelouse, terrasse, détecteurs de fumée, chauffe-eau.
      Vérifie le vault pour les événements passés.
      IMPORTANT: Si AUCUNE tâche n'est due maintenant, tu DOIS répondre uniquement le mot "SKIP" et rien d'autre.
      Ne dis PAS "rien à signaler" ou "aucune tâche". Réponds UNIQUEMENT "SKIP".
      Si une tâche est due, réponds en français avec la tâche, sois concis.
    notify_condition: not_skip
    priority: low

  - name: email-digest
    description: "Device alert summary"
    interval_minutes: 120
    model: qwen3:8b
    prompt: >
      Vérifie le vault pour les alertes d'appareils récentes aujourd'hui.
      Résume ce qui est notable.
      IMPORTANT: Si rien d'inhabituel ou aucune alerte, tu DOIS répondre uniquement "SKIP".
      Réponds en français.
    notify_condition: not_skip
    priority: low

  - name: friday-movies
    description: "Friday movie recommendations"
    interval_minutes: 600
    model: qwen3:8b
    day_of_week: friday
    active_hours: [17, 18, 19]
    prompt: >
      Utilise web_search pour chercher "meilleurs films streaming Canada 2026"
      et "best movies Netflix Prime Video Disney+ Crave this week".
      Recommande 3 films pour une soirée cinéma en famille. Pour chaque film:
      titre, genre, note, et une phrase de description. Écris en français.
    notify_condition: always
    priority: medium

  - name: weekend-activities
    description: "Weekend activity suggestions"
    interval_minutes: 1460
    model: qwen3:8b
    day_of_week: saturday
    active_hours: [8, 9]
    prompt: >
      Utilise web_search pour chercher "activités weekend Montréal Rive-Sud"
      et "événements famille Sainte-Julie cette fin de semaine".
      Suggère 2-3 activités familiales avec brève description. Écris en français.
    notify_condition: always
    priority: medium

behavior:
  max_notifications_per_hour: 4
  min_interval_minutes: 10
  high_priority_bypass: true
