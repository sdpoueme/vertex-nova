# Vertex Nova — Model Routing

routes:
  - name: vision
    patterns:
      - "\\[image\\]"
      - "photo"
      - "image"
      - "que vois"
    model: gemma4:e2b

  - name: news
    patterns:
      - "actualites"
      - "nouvelles"
      - "news"
      - "briefing"
      - "journal"
    model: qwen3:8b

default:
  model: qwen3:8b
