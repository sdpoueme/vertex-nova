# Vertex Nova — Per-Person Presence Settings
# Each person has their own welcome preferences, language, and notification settings.

settings:
  poll_seconds: 30
  day_away_minutes: 15          # Minutes before marking as "left" during daytime
  night_away_minutes: 60        # Minutes before marking as "left" at night (phones sleep on WiFi)
  consecutive_misses: 2         # Must miss this many polls before marking as "left"
  travel_ask_hours: 6           # Ask about travel after this many hours away
  vacation_hours: 24            # Auto-enable vacation mode when everyone away this long
  night_start: 23               # Night mode starts at this hour (0-23)
  night_end: 7                  # Night mode ends at this hour (0-23)

people:
  - name: Serge
    mac: 6c:3a:ff:8a:06:ed
    language: fr
    welcome_style: activity_summary
    welcome_room: Rez de Chaussee
    notifications: both

  - name: Stéphanie
    mac: a6:76:e3:60:57:6a
    language: fr
    welcome_style: simple
    welcome_room: Rez de Chaussee
    notifications: voice
