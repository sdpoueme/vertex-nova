<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertex Nova</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwindcss.config={darkMode:'class',theme:{extend:{colors:{vn:{primary:'#7c3aed',dark:'#0f172a',card:'#1e293b',border:'#334155',text:'#e2e8f0',muted:'#94a3b8'}}}}}</script>
<style>
.msg-user { background: #7c3aed; }
.msg-bot { background: #1e293b; border: 1px solid #334155; }
.recording { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body class="bg-vn-dark text-vn-text min-h-screen">

<!-- Top Nav -->
<nav class="bg-vn-card border-b border-vn-border px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="text-xl">⚡</span>
    <span class="text-lg font-semibold text-white">Vertex Nova</span>
  </div>
  <div id="statusBar" class="flex gap-3 text-sm"></div>
</nav>

<!-- Tabs -->
<div class="border-b border-vn-border bg-vn-card">
  <div class="max-w-7xl mx-auto px-6 flex gap-1">
    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-vn-primary text-white" onclick="showTab('chat',this)">💬 Chat</button>
    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-vn-muted hover:text-white" onclick="showTab('config',this)">⚙️ Configuration</button>
    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-vn-muted hover:text-white" onclick="showTab('logs',this)">📋 Logs</button>
  </div>
</div>

<div class="max-w-7xl mx-auto p-6">

<!-- Chat Panel -->
<div class="panel" id="panel-chat">
  <div class="bg-vn-card rounded-lg border border-vn-border">
    <div class="p-4 border-b border-vn-border flex gap-2">
      <button id="btnMic" onclick="toggleRecording()" class="px-3 py-1.5 bg-vn-dark border border-vn-border rounded-md text-sm hover:bg-slate-700">🎤 Audio</button>
      <button onclick="document.getElementById('imgInput').click()" class="px-3 py-1.5 bg-vn-dark border border-vn-border rounded-md text-sm hover:bg-slate-700">📷 Image</button>
      <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleImage(event)">
    </div>
    <div id="chatMessages" class="h-96 overflow-y-auto p-4 space-y-3"></div>
    <div class="p-4 border-t border-vn-border flex gap-2">
      <input type="text" id="chatInput" placeholder="Écrivez un message..." onkeydown="if(event.key==='Enter')sendMessage()"
        class="flex-1 px-4 py-2.5 bg-vn-dark border border-vn-border rounded-lg text-white placeholder-vn-muted focus:outline-none focus:border-vn-primary">
      <button onclick="sendMessage()" class="px-6 py-2.5 bg-vn-primary hover:bg-purple-700 text-white rounded-lg font-medium">Envoyer</button>
    </div>
  </div>
</div>

<!-- Config Panel -->
<div class="panel hidden" id="panel-config">
  <div class="flex gap-4 mb-4">
    <select id="configFile" onchange="loadConfig()" class="px-3 py-2 bg-vn-card border border-vn-border rounded-lg text-white">
      <option value="config/routing.yaml">🔀 Routing</option>
      <option value="config/proactive.yaml">⏰ Actions proactives</option>
      <option value="agent.md">🤖 Agent prompt</option>
    </select>
    <button onclick="saveConfig()" class="px-4 py-2 bg-vn-primary hover:bg-purple-700 text-white rounded-lg text-sm font-medium">💾 Sauvegarder</button>
    <button onclick="reloadConfig()" class="px-4 py-2 bg-vn-card border border-vn-border hover:bg-slate-700 text-vn-muted rounded-lg text-sm">🔄 Recharger</button>
  </div>
  <div class="grid grid-cols-2 gap-4">
    <!-- Forms -->
    <div class="bg-vn-card rounded-lg border border-vn-border p-5 overflow-y-auto max-h-[600px]" id="configForms"></div>
    <!-- YAML -->
    <div>
      <textarea id="configEditor" class="w-full h-[580px] bg-vn-card border border-vn-border rounded-lg p-4 text-sm font-mono text-vn-text focus:outline-none focus:border-vn-primary resize-none"></textarea>
    </div>
  </div>
</div>

<!-- Logs Panel -->
<div class="panel hidden" id="panel-logs">
  <div class="mb-3">
    <button onclick="loadLogs()" class="px-4 py-2 bg-vn-card border border-vn-border hover:bg-slate-700 text-vn-muted rounded-lg text-sm">🔄 Rafraîchir</button>
  </div>
  <div id="logViewer" class="h-[500px] overflow-y-auto bg-black rounded-lg p-4 font-mono text-xs text-slate-500 whitespace-pre-wrap"></div>
</div>

</div>

<script>
var API='',pendingImage=null,mediaRecorder=null,audioChunks=[];

function showTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('border-vn-primary','text-white');t.classList.add('border-transparent','text-vn-muted');});
  btn.classList.add('border-vn-primary','text-white');btn.classList.remove('border-transparent','text-vn-muted');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.add('hidden');});
  document.getElementById('panel-'+name).classList.remove('hidden');
  if(name==='config')loadConfig();if(name==='logs')loadLogs();
}

function addMsg(role,text){
  var d=document.createElement('div');
  d.className='p-3 rounded-lg max-w-[80%] text-sm '+(role==='user'?'msg-user ml-auto':'msg-bot');
  d.textContent=text;
  var c=document.getElementById('chatMessages');c.appendChild(d);c.scrollTop=c.scrollHeight;
}

async function sendMessage(){
  var input=document.getElementById('chatInput'),text=input.value.trim();
  if(!text&&!pendingImage)return;input.value='';addMsg('user',text||'[Image]');
  var body={message:text||"Analyse cette image"};
  if(pendingImage){body.image=pendingImage;pendingImage=null;}
  try{var r=await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var d=await r.json();addMsg('assistant',d.response||d.error||'Pas de réponse');}
  catch(e){addMsg('assistant','Erreur: '+e.message);}
}

function handleImage(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();
r.onload=function(ev){pendingImage={base64:ev.target.result.split(',')[1],mediaType:f.type||'image/jpeg'};addMsg('user','📷 '+f.name);};r.readAsDataURL(f);}

async function toggleRecording(){
  var btn=document.getElementById('btnMic');
  if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();btn.classList.remove('recording','bg-red-600');btn.textContent='🎤 Audio';return;}
  try{var s=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(s);audioChunks=[];
  mediaRecorder.ondataavailable=function(e){audioChunks.push(e.data);};
  mediaRecorder.onstop=async function(){s.getTracks().forEach(function(t){t.stop();});addMsg('user','🎤 Audio...');
  try{var r=await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'[Audio from dashboard]'})});
  var d=await r.json();addMsg('assistant',d.response||'Pas de réponse');}catch(e){addMsg('assistant','Erreur: '+e.message);}};
  mediaRecorder.start();btn.classList.add('recording','bg-red-600');btn.textContent='⏹ Stop';
  }catch(e){addMsg('assistant','Erreur micro: '+e.message);}
}

async function loadConfig(){
  var file=document.getElementById('configFile').value;
  try{var r=await fetch(API+'/api/config?file='+encodeURIComponent(file));var d=await r.json();
  document.getElementById('configEditor').value=d.content||d.error;buildForms(file,d.content||'');}
  catch(e){document.getElementById('configEditor').value='Erreur: '+e.message;}
}

function buildForms(file,yaml){
  var c=document.getElementById('configForms');
  if(file==='config/routing.yaml'){buildRoutingForm(c,yaml);}
  else if(file==='config/proactive.yaml'){buildProactiveForm(c,yaml);}
  else{c.innerHTML='<h3 class="text-lg font-semibold text-white mb-2">🤖 Agent Prompt</h3><p class="text-vn-muted text-sm">Éditez le prompt directement dans l\'éditeur YAML à droite.</p>';}
}

function buildRoutingForm(c,yaml){
  var routes=[],def='qwen3:8b',lines=yaml.split('\n'),cur=null;
  for(var i=0;i<lines.length;i++){var l=lines[i];
  var nm=l.match(/^\s+-\s+name:\s*(.+)/);if(nm){cur={name:nm[1].trim(),patterns:[],model:''};routes.push(cur);}
  if(cur&&l.match(/^\s+model:\s*(.+)/))cur.model=l.match(/^\s+model:\s*(.+)/)[1].trim();
  if(cur&&l.match(/^\s+-\s+"(.+)"/))cur.patterns.push(l.match(/^\s+-\s+"(.+)"/)[1]);
  if(l.match(/^default:/)&&i+1<lines.length){var dm=lines[i+1].match(/model:\s*(.+)/);if(dm)def=dm[1].trim();}}
  var h='<h3 class="text-lg font-semibold text-white mb-4">🔀 Routes</h3>';
  h+='<div class="mb-4"><label class="block text-xs text-vn-muted mb-1">Modèle par défaut</label><select class="w-full px-3 py-2 bg-vn-dark border border-vn-border rounded-md text-white text-sm">';
  ['qwen3:8b','claude','gemma4:e2b'].forEach(function(m){h+='<option'+(def===m?' selected':'')+'>'+m+'</option>';});
  h+='</select></div>';
  routes.forEach(function(r){h+='<div class="bg-vn-dark rounded-lg p-3 mb-2 border border-vn-border"><div class="flex justify-between items-center"><span class="font-medium text-white text-sm">'+r.name+'</span><span class="text-xs px-2 py-0.5 rounded-full '+(r.model==='claude'?'bg-blue-900 text-blue-300':'bg-green-900 text-green-300')+'">'+r.model+'</span></div><div class="text-xs text-vn-muted mt-1">'+r.patterns.join(' · ')+'</div></div>';});
  c.innerHTML=h;
}

function buildProactiveForm(c,yaml){
  var actions=[],lines=yaml.split('\n'),cur=null,inP=false;
  for(var i=0;i<lines.length;i++){var l=lines[i];
  var nm=l.match(/^\s+-\s+name:\s*(.+)/);if(nm){if(cur)actions.push(cur);cur={name:nm[1].trim(),interval:'',model:'',priority:''};inP=false;}
  if(cur){var kv=l.match(/^\s{4}(\w+):\s*(.+)/);if(kv&&!inP){if(kv[1]==='interval_minutes')cur.interval=kv[2].trim();if(kv[1]==='model')cur.model=kv[2].trim();if(kv[1]==='priority')cur.priority=kv[2].trim();if(kv[1]==='prompt')inP=true;}}}
  if(cur)actions.push(cur);
  var icons={'breaking-news':'🌍','weather-alert':'🌪️','home-maintenance-check':'🔧','email-digest':'📬','friday-movies':'🎬','weekend-activities':'🎯'};
  var h='<h3 class="text-lg font-semibold text-white mb-4">⏰ Actions</h3>';
  actions.forEach(function(a){
  h+='<div class="bg-vn-dark rounded-lg p-4 mb-3 border border-vn-border">';
  h+='<div class="font-medium text-white mb-3">'+(icons[a.name]||'📋')+' '+a.name+'</div>';
  h+='<div class="grid grid-cols-3 gap-3">';
  h+='<div><label class="block text-xs text-vn-muted mb-1">Intervalle (min)</label><input type="number" value="'+a.interval+'" class="w-full px-2 py-1.5 bg-vn-card border border-vn-border rounded text-sm text-white"></div>';
  h+='<div><label class="block text-xs text-vn-muted mb-1">Modèle</label><select class="w-full px-2 py-1.5 bg-vn-card border border-vn-border rounded text-sm text-white">';
  ['qwen3:8b','claude','gemma4:e2b'].forEach(function(m){h+='<option'+(a.model===m?' selected':'')+'>'+m+'</option>';});
  h+='</select></div>';
  h+='<div><label class="block text-xs text-vn-muted mb-1">Priorité</label><select class="w-full px-2 py-1.5 bg-vn-card border border-vn-border rounded text-sm text-white">';
  ['high','medium','low'].forEach(function(p){h+='<option'+(a.priority===p?' selected':'')+'>'+p+'</option>';});
  h+='</select></div></div></div>';});
  h+='<div class="mt-4 pt-4 border-t border-vn-border"><h4 class="text-xs text-vn-muted uppercase tracking-wider mb-3">Comportement</h4>';
  h+='<div class="grid grid-cols-2 gap-3">';
  h+='<div><label class="block text-xs text-vn-muted mb-1">Max notif/heure</label><input type="number" value="4" class="w-full px-2 py-1.5 bg-vn-dark border border-vn-border rounded text-sm text-white"></div>';
  h+='<div><label class="block text-xs text-vn-muted mb-1">Min intervalle (min)</label><input type="number" value="10" class="w-full px-2 py-1.5 bg-vn-dark border border-vn-border rounded text-sm text-white"></div>';
  h+='</div><label class="flex items-center gap-2 mt-3 text-sm text-vn-text"><input type="checkbox" checked class="rounded"> Haute priorité ignore les limites</label></div>';
  c.innerHTML=h;
}

async function saveConfig(){var f=document.getElementById('configFile').value,ct=document.getElementById('configEditor').value;
try{var r=await fetch(API+'/api/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({file:f,content:ct})});
var d=await r.json();alert(d.saved?'✅ Sauvegardé!':'Erreur: '+d.error);}catch(e){alert('Erreur: '+e.message);}}

async function reloadConfig(){try{var r=await fetch(API+'/api/reload',{method:'POST'});var d=await r.json();
alert(d.reloaded?'✅ Configuration rechargée!':'Erreur: '+d.error);}catch(e){alert('Erreur: '+e.message);}}

async function loadLogs(){try{var r=await fetch(API+'/api/logs');var d=await r.json();
var v=document.getElementById('logViewer');v.textContent=d.logs;v.scrollTop=v.scrollHeight;}
catch(e){document.getElementById('logViewer').textContent='Erreur: '+e.message;}}

async function loadStatus(){try{var r=await fetch(API+'/api/status');var d=await r.json();
document.getElementById('statusBar').innerHTML=
'<span class="flex items-center gap-1.5 text-xs"><span class="w-2 h-2 rounded-full bg-green-500"></span>'+Math.round(d.uptime/60)+'min</span>'+
'<span class="text-xs text-vn-muted">🤖 '+d.model+'</span>'+
'<span class="flex items-center gap-1.5 text-xs"><span class="w-2 h-2 rounded-full '+(d.ollama?'bg-green-500':'bg-red-500')+'"></span>Ollama</span>'+
'<span class="flex items-center gap-1.5 text-xs"><span class="w-2 h-2 rounded-full '+(d.telegram?'bg-green-500':'bg-yellow-500')+'"></span>Telegram</span>'+
'<span class="text-xs text-vn-muted">💾 '+d.memory+'</span>';}catch(e){}}
loadStatus();setInterval(loadStatus,30000);
</script>
</body>
</html>
